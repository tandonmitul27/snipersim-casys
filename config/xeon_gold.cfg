# Sniper configuration translated from xeon_gold.json
# Models one socket of Intel Xeon Gold 6548Y+: 32 cores, SMT off, 60 MiB shared LLC, DDR5-5200 x2 channels.

#include nehalem

[general]
total_cores = 32
enable_icache_modeling = true

[perf_model/core]
frequency = 4.1                     # 4100 MHz
logical_cpus = 1                    # SMT disabled per JSON metadata
type = rob

[perf_model/core/interval_timer]
dispatch_width = 6
window_size = 512                   # rob_size from JSON
num_outstanding_loadstores = 72     # min(lq_size, sq_size) ~ store-buffer width

[perf_model/core/rob_timer]
in_order = false
issue_contention = true
mlp_histogram = false
issue_memops_at_issue = true
outstanding_loads = 128             # lq_size
outstanding_stores = 72             # sq_size
store_to_load_forwarding = true
address_disambiguation = true
rob_repartition = true
simultaneous_issue = true
commit_width = 8                    # retire_width
rs_entries = 160                    # scheduler_size

[perf_model/branch_predictor]
type = pentium_m
mispredict_penalty = 1              # mispredict_penalty from JSON

[perf_model/tlb]
penalty = 30
penalty_parallel = true

[perf_model/itlb]
size = 64                           # 16 sets x 4 ways
associativity = 4

[perf_model/dtlb]
size = 64                           # 16 sets x 4 ways
associativity = 4

[perf_model/stlb]
size = 1536                         # 128 sets x 12 ways
associativity = 12

[perf_model/cache]
levels = 3

[perf_model/l1_icache]
perfect = false
cache_block_size = 64
cache_size = 32                     # 64 sets x 8 ways x 64 B
associativity = 8
address_hash = mask
replacement_policy = lru
data_access_time = 4                # JSON L1I latency
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1
prefetcher = none

[perf_model/l1_dcache]
perfect = false
cache_block_size = 64
cache_size = 48                     # 64 sets x 12 ways x 64 B
associativity = 12
address_hash = mask
replacement_policy = lru
data_access_time = 5                # JSON L1D latency
tags_access_time = 1
perf_model_type = parallel
writethrough = 0
shared_cores = 1
outstanding_misses = 16             # mshr_size
prefetcher = none

[perf_model/l2_cache]
perfect = false
cache_block_size = 64
cache_size = 2048                   # 2048 sets x 16 ways x 64 B = 2 MB
associativity = 16
address_hash = mask
replacement_policy = srrip
data_access_time = 11               # JSON L2 latency 15 cyc minus upstream tag access
tags_access_time = 3
writeback_time = 50
perf_model_type = parallel
writethrough = 0
shared_cores = 1
prefetcher = none

[perf_model/l3_cache]
perfect = false
cache_block_size = 64
cache_size = 61440                  # 65536 sets x 15 ways x 64 B = 60 MiB
associativity = 15
address_hash = mask
replacement_policy = srrip
data_access_time = 32               # JSON LLC latency 45 cyc minus upstream tag access
tags_access_time = 10
perf_model_type = parallel
writeback_time = 0
writethrough = 0
shared_cores = 32                   # one socket-local LLC domain
dvfs_domain = global
prefetcher = none

[perf_model/l2_cache/srrip]
bits = 2

[perf_model/l3_cache/srrip]
bits = 2

[perf_model/dram_directory]
total_entries = 1048576
associativity = 16
directory_type = full_map

[perf_model/dram]
type = constant
# DDR5-5200 (tCAS=tRCD=42 DRAM cycles @ 2600 MHz clock => ~32 ns CAS+RCD,
# add controller/queue overhead -> typical measured ~70 ns)
latency = 70
# Combine the two DDR5 channels into a single socket-level controller
# (Sniper requires controllers at master nodes of shared caches; LLC shared_cores = 32).
per_controller_bandwidth = 83.2     # 2 x 5200 MT/s x 8 B = 83.2 GB/s aggregate
num_controllers = -1
controllers_interleaving = 32

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 83.2                    # aggregate DDR5 bandwidth (2 x 41.6 GB/s)
ignore_local_traffic = true

[power]
vdd = 0.8                           # approx for Intel 7 (10 nm) class node
technology_node = 22                # nearest McPAT-supported node (22 nm)
