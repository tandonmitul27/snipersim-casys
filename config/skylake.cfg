# Intel Skylake-SP (Xeon Gold 6154, 18-core)
# https://en.wikichip.org/wiki/intel/microarchitectures/skylake_(server)
# Cache math:
#   L1: 32 KB / (8-way * 64 B) = 64 sets
#   L2: 1024 KB / (16-way * 64 B) = 1024 sets
#   L3: 16384 KB / (16-way * 64 B) = 16384 sets
# controllers_interleaving must be a multiple of l3_cache/shared_cores (18)

#include nehalem

[general]
total_cores = 18

[perf_model/core]
frequency = 3.0
type = rob
core_model = nehalem

[perf_model/core/interval_timer]
dispatch_width = 4
window_size = 224
num_outstanding_loadstores = 12

[perf_model/core/rob_timer]
in_order = false
issue_contention = true
mlp_histogram = false
issue_memops_at_issue = true
outstanding_loads = 72
outstanding_stores = 56
store_to_load_forwarding = true
address_disambiguation = true
simultaneous_issue = true
commit_width = 224
rs_entries = 97

[perf_model/branch_predictor]
type = pentium_m
mispredict_penalty = 15

[perf_model/itlb]
size = 128
associativity = 8

[perf_model/dtlb]
size = 64
associativity = 4

[perf_model/stlb]
size = 1536
associativity = 12

[perf_model/l1_icache]
cache_size = 32
associativity = 8
data_access_time = 4
tags_access_time = 1
shared_cores = 1

[perf_model/l1_dcache]
cache_size = 32
associativity = 8
data_access_time = 4
tags_access_time = 1
shared_cores = 1
outstanding_misses = 10

[perf_model/l2_cache]
cache_size = 1024
associativity = 16
data_access_time = 12
tags_access_time = 4
writeback_time = 50
shared_cores = 1

[perf_model/l3_cache]
cache_block_size = 64
cache_size = 16384
associativity = 16
address_hash = mask
replacement_policy = lru
data_access_time = 35
tags_access_time = 10
perf_model_type = parallel
writethrough = 0
shared_cores = 18
dvfs_domain = global
prefetcher = none
writeback_time = 0
kv_cache_reserved_ways = 4

[perf_model/dram_directory]
total_entries = 1048576
associativity = 16
directory_type = full_map

[perf_model/dram]
num_controllers = -1
controllers_interleaving = 18
latency = 60
per_controller_bandwidth = 21.3
chips_per_dimm = 8
dimms_per_controller = 2

[network]
memory_model_1 = bus
memory_model_2 = bus

[network/bus]
bandwidth = 128.0
ignore_local_traffic = true

[dvfs/simple]
cores_per_socket = 18

[perf_model/scratchpad]
enabled = true
shared = false              # false = per-core private SPM, true = shared across all cores
size = 2097152              # 2 MB (bytes) — total for shared, per-core for private
access_latency = 2          # base cycles per read/write (flat, no tag lookup)
dma_bandwidth = 32          # bytes per cycle for DMA transfers
dma_startup_overhead = 10   # fixed cycles per DMA initiation
num_ports = 1               # shared mode: number of concurrent access ports
                            # (1 = fully serialized, N_cores = no contention)
                            # ignored in private mode

[power]
vdd = 0.9
technology_node = 14
